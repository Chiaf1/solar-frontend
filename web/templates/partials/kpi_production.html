{{ define "partials/kpi_production" }}
<div class="box production">
    <div class="kpi">
        <div class="kpi-label">Produzione attuale</div>
        <div class="kpi-value">
            {{ if .ProductionValue }}{{ printf "%.2f" .ProductionValue }}{{ else }}---{{ end }}
            <span class="kpi-unit">{{ .ProductionUnit }}</span>
        </div>
    </div>
</div>
{{ end }}
